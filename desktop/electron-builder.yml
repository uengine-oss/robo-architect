appId: org.uengine.robo-architect
productName: Robo-Architect
copyright: Copyright (c) ${author}

directories:
  output: out/dist
  buildResources: resources

files:
  - dist/**/*
  - package.json
  - "!**/*.map"
  - "!**/__tests__/**"

# Bundled runtimes that must NOT live inside the asar archive
# (the Python interpreter and the Neo4j server are launched as child processes).
asarUnpack:
  - resources/python/**
  - resources/neo4j/**

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icons/icon.ico
  artifactName: ${productName}-${version}-win-${arch}.${ext}

nsis:
  perMachine: false        # per-user install — no admin elevation required
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  artifactName: ${productName}-Setup-${version}.${ext}

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  icon: resources/icons/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  artifactName: ${productName}-${version}-mac-${arch}.${ext}

dmg:
  artifactName: ${productName}-${version}-mac-${arch}.${ext}

# Signing + notarize blocks are added in US1/T029.
# `publish` (update-feed) is added in US2/T032.
