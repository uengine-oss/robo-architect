# pdf2bpmn stack secrets — TEMPLATE ONLY (safe to commit; no real values).
#
# Usage:
#   cp deploy/secrets.example.yaml deploy/secrets.yaml
#   # fill in the real values in deploy/secrets.yaml (it is gitignored)
#   kubectl apply -f deploy/secrets.yaml
#
# Keys:
#   NEO4J_AUTH      "neo4j/<password>"  (used by the pdf2bpmn-neo4j container)
#   NEO4J_PASSWORD  "<password>"        (used by pdf2bpmn-api / pdf2bpmn-facade)
#   FACADE_API_KEY  "<shared secret>"   (X-API-Key gate on the public facade)
apiVersion: v1
kind: Secret
metadata:
  name: pdf2bpmn-secrets
  namespace: default
type: Opaque
stringData:
  NEO4J_AUTH: "neo4j/CHANGE_ME"
  NEO4J_PASSWORD: "CHANGE_ME"
  FACADE_API_KEY: "CHANGE_ME"
